version: '3.8'

services:
  fastapi_server:
    build: .
    container_name: financial_nlp_api
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          memory: 3G  # 🌟 Allocates up to 3GB RAM to stop the Out-Of-Memory (137) crash
    environment:
      - ENV=production
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
      - QDRANT_HOST=qdrant_vdb
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - qdrant_vdb

  mlflow_ui:
    build: .
    container_name: mlflow_dashboard
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    command: mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000

  qdrant_vdb:
    image: qdrant/qdrant:latest
    container_name: qdrant_vdb
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always